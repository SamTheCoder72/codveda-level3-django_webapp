<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Codveda Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .btn-custom {
            background-color: #198754;
            color: white;
            width: 100%;
            padding: 10px;
        }
        .btn-custom:hover {
            background-color: #146c43;
            color: white;
        }
        /* This styles Django's automatic form fields */
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .errorlist {
            color: red;
            font-weight: bold;
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">Welcome Back</h3>
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-custom mb-3">Secure Login</button>
    </form>
    
    <div class="text-center">
        <p class="mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none">Sign up here</a></p>
    </div>
</div>

</body>
</html>
